name: Package and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Stamp version into TOC
        run: |
          sed -i "s/^## Version: .*/## Version: ${{ steps.version.outputs.VERSION }}/" BarWarden.toc

      - name: Package addon into zip
        run: |
          mkdir -p build/BarWarden
          # Copy only addon files, exclude git/github/dev files
          rsync -av --exclude='.git' --exclude='.github' --exclude='.gitignore' --exclude='.claude*' --exclude='NeedToKnow' --exclude='RoguePowerBars' --exclude='*.md' . build/BarWarden/
          # Include README inside the zip for reference
          cp README.md build/BarWarden/
          cd build
          zip -r ../BarWarden.zip BarWarden/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: BarWarden.zip
          generate_release_notes: true
